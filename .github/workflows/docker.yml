name: Docker

on:
    # Runs after the Release workflow publishes to npm — ensures the package
    # is available on the registry before the Docker build installs it.
    workflow_run:
        workflows: [Release]
        types: [completed]
        branches: [main]

permissions:
    contents: read

jobs:
    docker:
        name: Build and push Docker image
        runs-on: ubuntu-latest
        # Only run if the Release workflow actually published a new version.
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        steps:
            - uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract version from package.json
              id: meta
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      allanoricil/nrg-sentinel:latest
                      allanoricil/nrg-sentinel:${{ steps.meta.outputs.version }}
