<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sentinel — Deployment Review</title>
        <script>window['MonacoEnvironment']={'getWorkerUrl':function(_0x7d6e2b,_0x1512d4){var _0x3d1335=location['origin'];if(_0x1512d4==='typescript'||_0x1512d4==='javascript')return _0x3d1335+'/vendor/monaco/dist/ts.worker.js';if(_0x1512d4==='json')return _0x3d1335+'/vendor/monaco/dist/json.worker.js';return _0x3d1335+'/vendor/monaco/dist/editor.worker.js';}};</script>
        <script src="/vendor/monaco/dist/editor.js" onerror="window.__monacoFailed = true"></script>
        <link rel="stylesheet" href="/vendor/font-awesome/css/font-awesome.min.css" />

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #f3f3f3;
                --bg2: #ffffff;
                --bg3: #eaeaea;
                --border: #dddddd;
                --text: #333333;
                --text2: #888888;
                --hdr-bg: #1f1f1f;
                --hdr-text: #f0f0f0;
                --accent: #aa4444;
                --green: #009900;
                --red: #cc0000;
                --amber: #d97706;
                --nr-port: #aaaaaa;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: Arial, Helvetica, sans-serif;
                font-size: 13px;
                overflow: hidden;
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            /* Header — matches Node-RED editor header exactly */
            .hdr {
                display: flex;
                align-items: center;
                height: 48px;
                padding: 2px 20px 0 20px;
                background: #000;
                border-bottom: 2px solid #c02020;
                flex-shrink: 0;
                font-size: 14px;
                color: #eee;
                gap: 0;
            }
            .hdr-logo {
                display: flex;
                align-items: center;
                gap: 8px;
                text-decoration: none;
                white-space: nowrap;
                color: #eee;
                font-size: 16px;
                font-weight: 400;
            }
            .hdr-logo img {
                height: 32px;
                vertical-align: middle;
            }
            .hdr-sep {
                color: #444;
                margin: 0 12px;
                font-size: 18px;
                font-weight: 200;
            }
            .hdr-title {
                font-size: 14px;
                font-weight: 600;
                color: #eee;
            }
            .hdr-meta {
                margin-left: auto;
                font-size: 12px;
                color: #888;
            }
            .hdr-q {
                font-size: 12px;
                color: #ccc;
                padding: 2px 8px;
                border: 1px solid #444;
                border-radius: 3px;
                margin-left: 10px;
            }
            .hdr-view-badge {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 2px 7px;
                border-radius: 3px;
                margin-left: 8px;
            }
            .hdr-view-badge-approved { background: #14532d; color: #86efac; }
            .hdr-view-badge-rejected { background: #450a0a; color: #fca5a5; }

            /* Step progress bar */
            .np {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                overflow-x: auto;
                flex-shrink: 0;
                scrollbar-width: none;
            }
            .np::-webkit-scrollbar { display: none; }
            .np-lbl {
                font-size: 14px;
                color: var(--text2);
                font-weight: 600;
                flex-shrink: 0;
            }
            .nc {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 0 9px;
                height: 28px;
                border-radius: 3px;
                border: 1px solid var(--border);
                cursor: pointer;
                font-size: 14px;
                color: var(--text2);
                white-space: nowrap;
                flex-shrink: 0;
                transition: all 0.1s;
                position: relative;
                background: var(--bg);
            }
            .nc:hover {
                border-color: #aaa;
                color: var(--text);
            }
            .nc.active {
                border-color: var(--accent);
                color: var(--text);
                background: #fafafa;
            }
            .nc.approved {
                border-color: var(--green) !important;
                background: #f0fff0 !important;
            }
            .nc-badge {
                font-weight: 800;
                font-size: 15px;
            }
            .nc.added .nc-badge {
                color: var(--green);
            }
            .nc.removed .nc-badge {
                color: var(--red);
            }
            .nc.modified .nc-badge {
                color: var(--amber);
            }
            .nc.visual .nc-badge {
                color: #6366f1;
            }
            .nc-ok {
                position: absolute;
                top: -5px;
                right: -5px;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--green);
                color: #fff;
                font-size: 8px;
                font-weight: 800;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Substep tabs */
            .stabs {
                display: flex;
                flex-shrink: 0;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
            }
            .stab {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 7px 16px;
                font-size: 14px;
                cursor: pointer;
                color: var(--text2);
                border-bottom: 2px solid transparent;
                transition: all 0.12s;
            }
            .stab:hover {
                color: var(--text);
            }
            .stab.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }
            .snum {
                width: 17px;
                height: 17px;
                border-radius: 50%;
                font-size: 10px;
                font-weight: 800;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg3);
                border: 1px solid var(--border);
            }
            .stab.active .snum {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff;
            }

            /* Content */
            .content {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-height: 0;
            }

            /* Props view */
            .props-wrap {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-height: 0;
            }
            .props-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
                background: var(--bg);
            }
            .prop-card {
                border: 1px solid var(--border);
                border-radius: 3px;
                margin-bottom: 10px;
                overflow: hidden;
                background: var(--bg2);
            }
            .prop-card:last-child {
                margin-bottom: 0;
            }
            .pc-hdr {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 10px;
                background: var(--bg3);
                border-bottom: 1px solid var(--border);
            }
            .pc-key {
                font-family: Consolas, monospace;
                font-size: 12px;
                font-weight: 700;
                color: var(--text);
            }
            .pc-badge {
                font-size: 10px;
                font-weight: 700;
                padding: 1px 6px;
                border-radius: 3px;
                border: 1px solid;
            }
            .pc-badge.added {
                color: var(--green);
                border-color: rgba(0, 153, 0, 0.4);
                background: rgba(0, 153, 0, 0.08);
            }
            .pc-badge.removed {
                color: var(--red);
                border-color: rgba(204, 0, 0, 0.4);
                background: rgba(204, 0, 0, 0.08);
            }
            .pc-badge.modified {
                color: var(--amber);
                border-color: rgba(217, 119, 6, 0.4);
                background: rgba(217, 119, 6, 0.08);
            }
            .pc-diff {
                min-height: 72px;
            }
            .props-empty {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px;
                color: var(--text2);
                font-size: 13px;
                text-align: center;
                flex-direction: column;
                gap: 8px;
            }

            /* Canvas — NR style */
            .canvas-wrap {
                flex: 1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                overflow: hidden;
                min-height: 0;
            }
            .canvas-pane {
                display: flex;
                flex-direction: column;
                overflow: hidden;
                border-right: 1px solid var(--border);
            }
            .canvas-pane:last-child {
                border-right: none;
            }
            .canvas-pane-hdr {
                border-bottom: 1px solid var(--border);
                background: var(--bg2);
                flex-shrink: 0;
            }
            .cp-lbl {
                display: inline-flex;
                align-items: center;
                font-size: 11px;
                font-weight: 700;
                color: var(--text);
                padding: 5px 14px;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                background: var(--bg2);
                text-decoration: none;
            }
            .cc {
                flex: 1;
                overflow: hidden;
                position: relative;
            }
            .canvas-empty {
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 1;
                color: var(--text2);
                font-size: 12px;
                background: var(--bg);
            }
            .canvas-grid {
                width: 100%;
                height: 100%;
                background-color: #f3f3f3;
                background-image:
                    linear-gradient(#e1e1e1 1px, transparent 1px),
                    linear-gradient(90deg, #e1e1e1 1px, transparent 1px);
                background-size: 20px 20px;
                position: relative;
            }
            .canvas-grid .canvas-empty {
                position: absolute;
                inset: 0;
                background: transparent;
            }

            /* Hide SVG canvas content when an empty/synthetic tab is active.
               The tab bar (outside the SVG) stays visible so the user can switch tabs.
               opacity:0 + pointer-events:none is used instead of visibility:hidden because
               both LEFT and RIGHT renderers use <pattern id="grid"> (a document-global ID).
               visibility:hidden propagates to the <pattern> element, which makes the
               fill="url(#grid)" on the RIGHT canvas also invisible.  opacity:0 is a
               compositing operation that does not affect SVG fill paint server resolution. */
            [data-sentinel-empty-canvas] svg { opacity: 0; pointer-events: none; }

            /* Action bar */
            .abar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: var(--bg2);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }
            .node-info {
                display: flex;
                align-items: center;
                gap: 6px;
                min-width: 0;
            }
            .chg-badge {
                font-size: 10px;
                font-weight: 700;
                padding: 2px 7px;
                border-radius: 3px;
                border: 1px solid;
                flex-shrink: 0;
            }
            .chg-badge.added {
                color: var(--green);
                border-color: rgba(0, 153, 0, 0.4);
                background: rgba(0, 153, 0, 0.08);
            }
            .chg-badge.removed {
                color: var(--red);
                border-color: rgba(204, 0, 0, 0.4);
                background: rgba(204, 0, 0, 0.08);
            }
            .chg-badge.modified {
                color: var(--amber);
                border-color: rgba(217, 119, 6, 0.4);
                background: rgba(217, 119, 6, 0.08);
            }
            .node-name {
                font-size: 14px;
                font-weight: 600;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 200px;
            }
            .approve-progress {
                font-size: 14px;
                color: var(--text2);
                white-space: nowrap;
            }
            .nav-btns {
                display: flex;
                gap: 6px;
                margin-left: auto;
            }
            .btn {
                padding: 7px 14px;
                border-radius: 3px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                border: 1px solid;
                font-family: inherit;
                transition: filter 0.1s;
                white-space: nowrap;
                line-height: 1.4;
            }
            .btn:hover:not(:disabled) {
                filter: brightness(0.92);
            }
            .btn:disabled {
                opacity: 0.45;
                cursor: default;
            }
            /* Neutral — standard Node-RED gray */
            .btn-back,
            .btn-next,
            .btn-canvas {
                background: #e6e6e6;
                color: #333;
                border-color: #ccc;
            }
            /* Per-node approve — solid green */
            .btn-appnode {
                background: #4e9a4e;
                color: #fff;
                border-color: #3d7a3d;
            }
            /* Reject — red outline */
            .btn-reject {
                background: #fff;
                color: #aa2020;
                border-color: #aa2020;
            }
            /* Deploy — Node-RED deploy red */
            .btn-deploy {
                background: #AD1625;
                color: #fff;
                border-color: #8b111d;
            }

            /* Confirmation modal */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            .modal {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 24px;
                min-width: 320px;
                max-width: 480px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            }
            .modal-title {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 10px;
            }
            .modal-body {
                font-size: 14px;
                color: var(--text);
                margin-bottom: 20px;
            }
            .modal-btns {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
            }
            /* Node disabled/enabled indicator */
            .node-state-badge {
                font-size: 10px;
                font-weight: 700;
                padding: 1px 6px;
                border-radius: 3px;
                border: 1px solid;
                flex-shrink: 0;
            }
            .node-state-badge.disabled {
                color: var(--amber);
                border-color: rgba(217,119,6,0.4);
                background: rgba(217,119,6,0.08);
            }
            .node-state-badge.enabled {
                color: var(--green);
                border-color: rgba(0,153,0,0.4);
                background: rgba(0,153,0,0.08);
            }

            /* The renderer gives the last .red-ui-tab its right border via :last-child.
               When we append badge <span>s to the tab bar after the tabs, :last-child
               shifts to the badge element and the last tab loses its right border.
               :last-of-type is unaffected by sibling elements of other types (spans),
               so it reliably targets the last tab regardless of appended badges. */
            .cc .red-ui-tab:last-of-type {
                border-right: 1px solid #bbbbbb !important;
            }

            /* Badge hover — scale up on mouse-over */
            [data-sentinel-tab-badge] {
                transition: transform 0.15s ease;
                transform-origin: center;
            }
            [data-sentinel-tab-badge]:hover {
                transform: scale(1.35);
            }
            [data-sentinel-node-badge] {
                transition: transform 0.15s ease;
                transform-box: fill-box;
                transform-origin: center;
            }
            [data-sentinel-node-badge]:hover {
                transform: scale(1.35);
            }

            /* Center / status */
            .center {
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 1;
                color: var(--text2);
            }
            .sbar {
                padding: 5px 14px;
                font-size: 12px;
                font-weight: 600;
                text-align: center;
                flex-shrink: 0;
            }
            .sbar.ok {
                background: rgba(0, 153, 0, 0.1);
                color: var(--green);
            }
            .sbar.err {
                background: rgba(204, 0, 0, 0.1);
                color: var(--red);
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div class="center" v-if="loading">Loading&#8230;</div>

            <div class="center" v-else-if="!item">
                <div style="text-align: center">
                    <div style="font-size: 36px; margin-bottom: 12px; color: var(--green)">&#x2713;</div>
                    <div style="font-size: 15px; font-weight: 700; margin-bottom: 6px">Queue is empty</div>
                    <div style="color: var(--text2)">All deployments have been reviewed.</div>
                </div>
            </div>

            <template v-else>
                <div class="hdr">
                    <span class="hdr-logo">
                        <img src="/red/images/node-red.svg" alt="Node-RED" />
                        <span>Node-RED</span>
                    </span>
                    <span class="hdr-sep">|</span>
                    <span class="hdr-title">{{ viewMode ? 'Deployment History' : 'Deployment Review' }}</span>
                    <span v-if="viewMode && item" class="hdr-view-badge" :class="'hdr-view-badge-' + item.status">{{ item.status }}</span>
                    <span class="hdr-meta">by {{ userLabel }} &mdash; {{ dateLabel }}</span>
                    <span class="hdr-q" v-if="!viewMode && totalPending > 1">{{ queueIdx+1 }} / {{ totalPending }} in queue</span>
                </div>

                <!-- Step progress bar -->
                <div class="np" ref="stepNav">
                    <span class="np-lbl">Steps:</span>
                    <div
                        v-for="(step, i) in steps"
                        :key="step.id"
                        class="nc"
                        :class="[step.changeType, {active: i===stepIdx, approved: isStepFullyApproved(step)}]"
                        :title="step.label"
                        @click="goToStep(i)"
                    >
                        <span class="nc-badge">{{ stepBadge(step) }}</span>
                        <span>{{ step.label.substring(0,18) }}</span>
                        <span v-if="step.isSubflow" style="font-size:9px;opacity:0.55;margin-left:1px;font-weight:700;letter-spacing:0.02em;">SUB</span>
                        <span v-else-if="step.isTab" style="font-size:9px;opacity:0.55;margin-left:1px;font-weight:700;letter-spacing:0.02em;">TAB</span>
                        <span class="nc-ok" v-if="isStepFullyApproved(step)">&#x2713;</span>
                    </div>
                </div>

                <!-- Content -->
                <div class="content" v-if="item">
                    <!-- Properties view (all node/wire steps) -->
                    <div class="props-wrap" v-if="currentStep && !currentStep.isVisual">
                        <!-- Sub-tabs: Properties / Description / Env Vars -->
                        <div class="stabs">
                            <div class="stab" :class="{active: propSubTab==='props'}" @click="propSubTab='props'">Properties</div>
                            <div class="stab" :class="{active: propSubTab==='desc'}" @click="propSubTab='desc'" v-if="infoDiff">Description</div>
                            <div class="stab" :class="{active: propSubTab==='env'}" @click="propSubTab='env'" v-if="envDiff.length">Env Vars</div>
                        </div>
                        <div class="props-scroll">
                            <!-- Properties sub-tab -->
                            <template v-if="propSubTab==='props'">
                                <div v-if="propDiffs.length===0" class="props-empty">
                                    <div>No property changes</div>
                                    <div style="font-size: 13px; color: var(--text2); margin-top: 4px">
                                        This change affects wires or node position only.
                                    </div>
                                </div>
                                <div v-for="p in propDiffs" :key="p.key" class="prop-card">
                                    <div class="pc-hdr">
                                        <span class="pc-key">{{ p.key }}</span>
                                        <span class="pc-badge" :class="p.type"
                                            >{{ p.type==='added' ? '+ new' : p.type==='removed' ? '− removed' : '~ changed'
                                            }}</span
                                        >
                                    </div>
                                    <div
                                        class="pc-diff"
                                        data-monaco-diff
                                        :data-before="fmtVal(p.before)"
                                        :data-after="fmtVal(p.after)"
                                        :data-lang="propLang(p)"
                                    ></div>
                                </div>
                            </template>
                            <!-- Description sub-tab -->
                            <template v-else-if="propSubTab==='desc' && infoDiff">
                                <div class="prop-card">
                                    <div class="pc-hdr">
                                        <span class="pc-key">description</span>
                                        <span class="pc-badge" :class="infoDiff.type">{{ infoDiff.type==='added' ? '+ new' : infoDiff.type==='removed' ? '− removed' : '~ changed' }}</span>
                                    </div>
                                    <div class="pc-diff" data-monaco-diff :data-before="infoDiff.before" :data-after="infoDiff.after" data-lang="markdown"></div>
                                </div>
                            </template>
                            <!-- Env Vars sub-tab — one card per changed entry, keyed by name -->
                            <template v-else-if="propSubTab==='env' && envDiff.length">
                                <div v-for="e in envDiff" :key="e.name" class="prop-card">
                                    <div class="pc-hdr">
                                        <span class="pc-key">{{ e.name }}</span>
                                        <span class="pc-badge" :class="e.type">{{ e.type==='added' ? '+ new' : e.type==='removed' ? '− removed' : '~ changed' }}</span>
                                    </div>
                                    <div
                                        class="pc-diff"
                                        data-monaco-diff
                                        :data-before="fmtEnvVal(e.before)"
                                        :data-after="fmtEnvVal(e.after)"
                                        :data-lang="envVarLang(e.after || e.before)"
                                    ></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Visual Review: single canvas showing ALL changes -->
                    <div class="canvas-wrap" v-else-if="currentStep && currentStep.isVisual">
                        <div class="canvas-pane">
                            <div class="canvas-pane-hdr"><div class="cp-lbl">Current</div></div>
                            <div ref="leftEl" class="cc"></div>
                        </div>
                        <div class="canvas-pane">
                            <div class="canvas-pane-hdr"><div class="cp-lbl">Proposed</div></div>
                            <div ref="rightEl" class="cc"></div>
                        </div>
                    </div>
                </div>

                <div class="sbar" :class="statusClass" v-if="statusMsg">{{ statusMsg }}</div>

                <!-- Action bar -->
                <div class="abar" v-if="item">
                    <template v-if="currentStep">
                        <div class="node-info">
                            <span class="chg-badge" :class="currentStep.changeType"
                                >{{ currentStep.isVisual ? 'visual' : currentStep.changeType }}</span
                            >
                            <span class="node-name">{{ currentStep.label }}</span>
                        </div>
                        <span class="approve-progress" v-if="!viewMode">{{ approvedCount }}/{{ steps.length }} approved</span>

                        <div class="nav-btns">
                            <button class="btn btn-back" @click="goBack" :disabled="stepIdx===0">&#x2190; Back</button>
                            <button class="btn btn-next" @click="goNext" v-if="!isLastStep">Next &#x2192;</button>
                        </div>

                        <!-- "Locate" — node steps: open Visual Review focused on this node -->
                        <button
                            class="btn btn-canvas"
                            @click="goToVisualFocused(currentStep.id)"
                            v-if="!currentStep.isVisual && !currentStep.isTab"
                            style="margin-left: 4px"
                        >
                            Locate
                        </button>
                        <!-- "Locate" — tab steps: open Visual Review and activate the tab -->
                        <button
                            class="btn btn-canvas"
                            @click="goToVisualFocusedTab(currentStep.id.slice(4))"
                            v-if="!currentStep.isVisual && currentStep.isTab"
                            style="margin-left: 4px"
                        >
                            Locate
                        </button>

                        <button
                            class="btn btn-appnode"
                            @click="approveNode"
                            :disabled="!!nodeApprovals[currentStep.id]"
                            v-if="!viewMode"
                            style="margin-left: 4px"
                        >
                            {{ nodeApprovals[currentStep.id] ? 'Approved' : 'Approve' }}
                        </button>
                    </template>
                    <button class="btn btn-reject" @click="doReject" :disabled="busy" v-if="!viewMode">Reject</button>
                    <button class="btn btn-deploy" @click="showDeployModal=true" :disabled="busy || !allApproved" v-if="!viewMode">
                        {{ allApproved ? 'Deploy' : 'Deploy (' + approvedCount + '/' + steps.length + ')' }}
                    </button>
                </div>

                <!-- Deployment confirmation modal -->
                <div class="modal-overlay" v-if="showDeployModal">
                    <div class="modal">
                        <div class="modal-title">Confirm Deployment</div>
                        <div class="modal-body">Deploy these changes to Node-RED? This will update the running flows.</div>
                        <div class="modal-btns">
                            <button class="btn btn-back" @click="showDeployModal=false">Cancel</button>
                            <button class="btn btn-deploy" @click="confirmDeploy" :disabled="busy">Deploy</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
