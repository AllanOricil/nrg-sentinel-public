<style>
    /* ── NRG Sentinel sidebar ─────────────────────────────────────── */
    .snl-wrap {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
        box-sizing: border-box;
    }

    /* Header */
    .snl-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px 6px;
        border-bottom: 1px solid var(--red-ui-secondary-border-color);
        flex-shrink: 0;
    }
    .snl-header-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--red-ui-primary-text-color);
        letter-spacing: 0.2px;
    }

    /* Logo */
    .snl-logo {
        position: relative;
        display: inline-flex;
        align-items: center;
        cursor: default;
        flex-shrink: 0;
    }
    .snl-logo--expired svg {
        filter: grayscale(1) opacity(0.45);
    }
    .snl-logo-tip {
        display: none;
        position: absolute;
        top: 26px;
        left: 0;
        white-space: nowrap;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 7px;
        border-radius: 3px;
        z-index: 9999;
        pointer-events: none;
    }
    .snl-logo:hover .snl-logo-tip {
        display: block;
    }
    .snl-logo--active .snl-logo-tip {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.35);
        color: #22c55e;
    }
    .snl-logo--trial .snl-logo-tip {
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid rgba(245, 158, 11, 0.35);
        color: #f59e0b;
    }
    .snl-logo--expired .snl-logo-tip {
        background: rgba(107, 114, 128, 0.15);
        border: 1px solid rgba(107, 114, 128, 0.35);
        color: #9ca3af;
    }

    /* Tab bar */
    .snl-tab-bar {
        display: flex;
        flex-shrink: 0;
        border-bottom: 1px solid var(--red-ui-secondary-border-color);
    }
    .snl-tab-btn {
        flex: 1;
        padding: 6px 8px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        color: var(--red-ui-secondary-text-color);
        outline: none;
        transition:
            color 0.1s,
            border-color 0.1s;
        margin-bottom: -1px;
    }
    .snl-tab-btn:hover {
        color: var(--red-ui-primary-text-color);
    }
    .snl-tab-btn.active {
        color: var(--red-ui-primary-text-color);
        border-bottom-color: var(--red-ui-button-color, #e04545);
    }
    /* Threats tab — count badge */
    .snl-tab-threats {
        position: relative;
    }
    .snl-threat-tab-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        background: #ef4444;
        color: #fff;
        border-radius: 8px;
        font-size: 9px;
        font-weight: 700;
        line-height: 16px;
        text-align: center;
        box-sizing: border-box;
        pointer-events: none;
    }
    /* Pulsing alert dot on the Sentinel sidebar selector button */
    .snl-sidebar-alert-dot {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        pointer-events: none;
        animation: snl-alert-pulse 2s ease-in-out infinite;
    }
    @keyframes snl-alert-pulse {
        0%,
        100% {
            opacity: 1;
            transform: scale(1);
        }
        50% {
            opacity: 0.4;
            transform: scale(0.65);
        }
    }

    /* Safe Deployment banner */
    .snl-sd-banner {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: rgba(245, 158, 11, 0.12);
        border-bottom: 1px solid rgba(245, 158, 11, 0.35);
        flex-shrink: 0;
    }
    .snl-sd-banner-text {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        color: #f59e0b;
    }
    .snl-sd-banner-btn {
        font-size: 11px;
        font-weight: 600;
        color: #f59e0b;
        text-decoration: none;
        padding: 2px 8px;
        border: 1px solid rgba(245, 158, 11, 0.5);
        border-radius: 3px;
        white-space: nowrap;
    }
    .snl-sd-banner-btn:hover {
        background: rgba(245, 158, 11, 0.15);
    }

    /* Tab panes */
    .snl-tab-pane {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 8px 12px;
        box-sizing: border-box;
    }

    /* Toolbar license icon — icon only, no pill, matches NR logo height (32px) */
    #snl-header-btn {
        display: flex;
        align-items: center;
    }
    #snl-header-btn a.button {
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 0 10px !important;
        margin: 0;
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        text-decoration: none;
        height: 100%;
        opacity: 0.9;
        transition: opacity .15s;
    }
    #snl-header-btn a.button:hover { opacity: 1; }
    /* Header icon: glow sits behind the SVG via z-index layering */
    .snl-hdr-icon {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .snl-hdr-icon-glow {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #a80000;
        filter: blur(10px);
        opacity: 0.9;
        z-index: 0;
        pointer-events: none;
    }
    .snl-hdr-icon svg {
        position: relative;
        z-index: 1;
        display: block;
    }

    /* Allow the sentinel tab label to show the inline badge without clipping */
    a[href="#sidebar-sentinel"].red-ui-tab-label {
        overflow: visible !important;
    }
    /* Sidebar tab status badge (Trial / Activated / Expired) */
    .snl-tab-status-badge {
        display: inline-block;
        vertical-align: middle;
        margin-left: 5px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .03em;
        text-transform: uppercase;
        padding: 2px 7px;
        border-radius: 4px;
        line-height: 16px;
        cursor: pointer;
        pointer-events: auto;
        white-space: nowrap;
        transition: opacity .15s;
    }
    .snl-tab-status-badge:hover { opacity: 0.75; }
    .snl-tab-badge-trial     { background: rgba(245,158,11,0.22); color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); }
    .snl-tab-badge-expired   { background: rgba(239,68,68,0.18);  color: #ef4444; border: 1px solid rgba(239,68,68,0.35); }
    .snl-tab-badge-licensed  { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3);  }

    /* Read-only notice */
    .snl-readonly-notice {
        font-size: 11px;
        color: var(--red-ui-tertiary-text-color, #f87171);
        padding: 0 0 6px;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--red-ui-secondary-border-color);
    }

    /* Node type collapsible panels */
    /* Node list rows */
    .snl-node-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .snl-node-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        background: var(--red-ui-secondary-background-color);
        border: 1px solid var(--red-ui-secondary-border-color);
        border-radius: 3px;
        cursor: pointer;
        user-select: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
        box-sizing: border-box;
    }
    .snl-node-row:hover {
        background: var(--red-ui-menu-hover-background-color);
    }
    .snl-node-row-name {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        color: var(--red-ui-primary-text-color);
        font-family: var(--red-ui-monospace-font, monospace);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .snl-node-row-badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 8px;
        white-space: nowrap;
        border: 1px solid transparent;
    }
    .snl-node-row-badge.has-perms {
        background: rgba(34, 197, 94, 0.12);
        color: #22c55e;
        border-color: rgba(34, 197, 94, 0.3);
    }
    .snl-node-row-badge.no-perms {
        background: var(--red-ui-primary-background-color);
        color: var(--red-ui-secondary-text-color);
        border-color: var(--red-ui-secondary-border-color);
    }
    .snl-node-row-arrow {
        font-size: 10px;
        color: var(--red-ui-secondary-text-color);
    }

    /* Standardised section label (replaces ad-hoc inline font styles) */
    .snl-section-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--red-ui-primary-text-color);
        margin: 4px 0;
    }

    /* Detail panel — sticky header */
    .snl-detail-hdr {
        position: sticky;
        top: -8px; /* compensate for snl-tab-pane 8px padding-top */
        z-index: 1;
        /* Guarantee a solid background so scrolled content doesn't bleed through */
        background-color: #ffffff;
        background-color: var(--red-ui-primary-background-color, #ffffff);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        margin: -8px -12px 10px; /* bleed into pane padding so it covers edge-to-edge */
        padding: 6px 12px 8px;
        border-bottom: 2px solid var(--red-ui-secondary-border-color);
    }
    .snl-detail-back {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 1px 0 3px;
        font-size: 11px;
        cursor: pointer;
        color: var(--red-ui-secondary-text-color);
        font-family: inherit;
    }
    .snl-detail-back:hover {
        color: var(--red-ui-primary-text-color);
    }
    .snl-detail-title-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
        width: 100%;
    }
    .snl-detail-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--red-ui-primary-text-color);
        font-family: var(--red-ui-monospace-font, monospace);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
    }
    .snl-save-status {
        font-size: 10px;
        color: var(--red-ui-secondary-text-color);
        flex-shrink: 0;
        transition: opacity 0.3s;
    }

    /* Inline buttons (sit alongside inputs/selects, match their height) */
    .snl-inline-btn {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        height: 34px !important;
        min-height: 34px !important;
        max-height: 34px !important;
        font-size: 12px !important;
        padding: 0 10px !important;
        line-height: 34px !important;
        white-space: nowrap;
        flex-shrink: 0;
        box-sizing: border-box !important;
        margin: 0 !important;
        border-width: 1px !important;
    }

    .snl-checkbox {
        margin: 0 !important;
    }

    /* Capability rows */
    .snl-cap-row {
        padding: 6px 0 8px;
        border-bottom: 1px solid var(--red-ui-secondary-border-color);
    }
    .snl-cap-row:first-child {
        padding-top: 2px;
    }
    .snl-cap-row:last-child {
        padding-bottom: 0;
        border-bottom: none;
    }
    .snl-cap-header {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .snl-cap-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--red-ui-primary-text-color);
    }
    /* Cap help text */
    .snl-cap-desc {
        font-size: 12px;
        color: var(--red-ui-secondary-text-color);
        margin-bottom: 5px;
        line-height: 1.4;
    }

    /* Search row (input only) */
    .snl-search-row {
        margin-bottom: 5px;
    }
    .snl-search-input {
        display: block;
        width: 100% !important;
        font-size: 12px;
        font-family: var(--red-ui-monospace-font, monospace);
        box-sizing: border-box !important;
        height: 34px !important;
        margin: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
    }

    /* Tag chips */
    .snl-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        min-height: 16px;
    }
    .snl-tag {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 8px;
        border: 1px solid var(--red-ui-secondary-border-color);
        border-radius: 10px;
        background: var(--red-ui-secondary-background-color);
        font-size: 12px;
        font-family: var(--red-ui-monospace-font, monospace);
        color: var(--red-ui-primary-text-color);
        line-height: 18px;
    }
    .snl-tag-rm {
        cursor: pointer;
        color: var(--red-ui-secondary-text-color);
        font-size: 9px;
        line-height: 1;
        padding: 0 1px;
        opacity: 0.8;
    }
    .snl-tag-rm:hover {
        opacity: 1;
    }
    .snl-none {
        font-size: 15px;
        color: var(--red-ui-secondary-text-color);
        font-style: italic;
        line-height: 18px;
    }
    .snl-tags .snl-none {
        display: block;
        width: 100%;
        text-align: center;
        padding: 8px 10px;
        border: 1px dashed var(--red-ui-secondary-border-color);
        border-radius: 4px;
        background: var(--red-ui-secondary-background-color);
        box-sizing: border-box;
        font-size: 12px;
        line-height: 1.4;
    }

    /* Threat log pane header */
    .snl-threat-pane-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 2px 6px;
        margin-bottom: 4px;
        border-bottom: 1px solid var(--red-ui-secondary-border-color);
        gap: 8px;
    }
    .snl-threat-count {
        font-size: 12px;
        font-weight: 700;
        color: var(--red-ui-primary-text-color);
        flex-shrink: 0;
    }
    .snl-threat-legend {
        font-size: 12px;
        color: var(--red-ui-secondary-text-color);
        text-align: right;
    }
    /* Threat log cards */
    .snl-threat-card {
        border: 1px solid var(--red-ui-secondary-border-color);
        border-radius: 4px;
        margin-bottom: 6px;
        overflow: hidden;
    }
    .snl-threat-card:last-child {
        margin-bottom: 0;
    }
    .snl-threat-card.sev-critical {
        border-left: 3px solid #ef4444;
    }
    .snl-threat-card.sev-high {
        border-left: 3px solid #f97316;
    }
    .snl-threat-card.sev-medium {
        border-left: 3px solid #f59e0b;
    }
    .snl-threat-hdr {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 9px;
        background: var(--red-ui-secondary-background-color);
        cursor: pointer;
        user-select: none;
    }
    .snl-threat-hdr:hover {
        background: var(--red-ui-menu-hover-background-color);
    }
    .snl-threat-title {
        flex: 1;
        font-size: 15px;
        color: var(--red-ui-primary-text-color);
    }
    .snl-threat-em {
        font-weight: 600;
    }
    .snl-threat-chevron {
        font-size: 12px;
        color: var(--red-ui-secondary-text-color);
        transition: transform 0.15s;
    }
    .snl-threat-body {
        padding: 8px 10px;
        background: var(--red-ui-primary-background-color);
        border-top: 1px solid var(--red-ui-secondary-border-color);
        display: none;
    }
    .snl-threat-row {
        font-size: 12px;
        color: var(--red-ui-primary-text-color);
        margin-bottom: 5px;
        line-height: 1.5;
    }
    .snl-threat-row:last-child {
        margin-bottom: 0;
    }
    .snl-threat-row b {
        color: var(--red-ui-primary-text-color);
        font-weight: 600;
    }
    .snl-threat-badges {
        display: flex;
        gap: 4px;
        align-items: center;
        margin-left: auto;
        flex-shrink: 0;
    }
    .snl-badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.4px;
        padding: 1px 5px;
        border-radius: 3px;
        line-height: 1.6;
        text-transform: uppercase;
    }
    .snl-badge-server {
        background: #1e3a5f;
        color: #7db9f5;
        border: 1px solid #2d5a8e;
    }
    .snl-badge-client {
        background: #1a3d2b;
        color: #6ee7a0;
        border: 1px solid #2d6b47;
    }
    .snl-threat-ts {
        font-size: 12px;
        color: var(--red-ui-secondary-text-color);
        margin-left: 6px;
        flex-shrink: 0;
    }
    .snl-threat-row code {
        font-family: var(--red-ui-monospace-font, monospace);
        font-size: 12px;
        background: var(--red-ui-secondary-background-color);
        padding: 1px 4px;
        border-radius: 3px;
        border: 1px solid var(--red-ui-secondary-border-color);
        word-break: break-all;
    }

    .snl-threat-stack {
        font-family: var(--red-ui-monospace-font, monospace);
        font-size: 12px;
        margin: 4px 0 0;
        padding: 6px 8px;
        background: var(--red-ui-secondary-background-color);
        border: 1px solid var(--red-ui-secondary-border-color);
        border-radius: 3px;
        overflow-x: auto;
    }
    .snl-threat-stack-frame {
        white-space: nowrap !important;
        line-height: 1.6;
    }

    /* ── CSP pane ─────────────────────────────────────────────── */
    .snl-csp-dirlist {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin: 6px 0;
    }
    .snl-csp-directive {
        background: var(--red-ui-secondary-background-color);
        border: 1px solid var(--red-ui-secondary-border-color);
        border-radius: 4px;
        padding: 6px 8px;
    }
    .snl-csp-directive-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
    }
    .snl-csp-directive-name {
        font-family: var(--red-ui-monospace-font, monospace);
        font-size: 12px;
        font-weight: 600;
        color: var(--red-ui-primary-text-color);
    }
    .snl-csp-dir-del {
        flex-shrink: 0;
        line-height: 1 !important;
        padding: 1px 5px !important;
        opacity: 0.55;
    }
    .snl-csp-dir-del:hover {
        opacity: 1;
    }
    .snl-csp-add-src {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 5px;
    }
    .snl-csp-src-select,
    .snl-csp-dir-select {
        font-size: 12px;

        flex: 1;
    }
    .snl-csp-src-input,
    .snl-csp-dir-input {
        flex: 1;

        font-family: var(--red-ui-monospace-font, monospace);
        height: 34px !important;
        box-sizing: border-box !important;

        font-family: var(--red-ui-monospace-font, monospace);

        color: var(--red-ui-secondary-text-color);

    /* Autocomplete dropdown — inherit NR style */
    .red-ui-autocomplete.ui-autocomplete {

        max-height: 180px;
        overflow-y: auto;

    /* ── SW Network Shield banner ─────────────────────────────── */
    .snl-sw-banner {
        position: fixed;
        bottom: 14px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px 6px 10px;
        background: #0d0d1a;
        border: 1px solid rgba(167, 139, 250, 0.22);
        border-left: 3px solid #a78bfa;
        border-radius: 8px;
        box-shadow:
            0 4px 16px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(167, 139, 250, 0.08);
        font-size: 11px;
        font-family: var(--red-ui-monospace-font, monospace);
        font-weight: 600;
        color: #e2e8f0;
        z-index: 9990;
        user-select: none;
        opacity: 0;
        transform: translateY(8px);
        transition:
            opacity 0.25s ease,
            transform 0.25s ease;
        pointer-events: none;
    }
    .snl-sw-banner.snl-sw-banner--visible {
        opacity: 1;
        transform: translateY(0);
    }
    .snl-sw-banner-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 7px rgba(34, 197, 94, 0.7);
        flex-shrink: 0;
        animation: snl-pulse 2.4s ease-in-out infinite;
    }
    @keyframes snl-pulse {
        0%,
        100% {
            box-shadow: 0 0 5px rgba(34, 197, 94, 0.6);
        }
        50% {
            box-shadow: 0 0 11px rgba(34, 197, 94, 0.95);
        }
    }
    .snl-sw-banner-brand {
        color: #a78bfa;
        font-weight: 700;
        letter-spacing: 0.3px;
    }
    .snl-sw-banner-sep {
        color: rgba(167, 139, 250, 0.35);
        font-weight: 400;
        font-size: 10px;
    }
    .snl-sw-banner-label {
        color: #cbd5e1;
        font-weight: 600;
        letter-spacing: 0.2px;
    }
    .snl-sw-banner-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: #22c55e;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.3);
        border-radius: 4px;
        padding: 1px 5px;
    }
    .snl-sw-banner-count {

        font-weight: 400;
        font-size: 10px;

    .snl-hist-td-status {

        color: #22c55e;
    }
    .snl-hist-td-status-rejected {
        color: #ef4444;
    }

        color: #f59e0b;
    }

        display: inline-block;

        border-radius: 3px;
        padding: 1px 4px;

        text-transform: uppercase;

        border-bottom: 2px solid var(--red-ui-secondary-border-color);
        white-space: nowrap;

    .snl-hist-table td {

        border-bottom: 1px solid var(--red-ui-secondary-border-color);
        color: var(--red-ui-primary-text-color);

    }

        color: var(--red-ui-secondary-text-color);
    }
